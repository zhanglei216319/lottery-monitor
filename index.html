<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞彩赔率监控</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; background: #f0f2f5; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    h1 { color: #0b2b5e; }
    .green { color: #16a34a; } .red { color: #dc2626; }
    button { padding: 10px 20px; border-radius: 20px; border: none; background: #0b2b5e; color: #fff; font-weight: 600; cursor: pointer; margin: 5px; }
    .status { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 0.7rem; }
    .real { background: #dcfce7; color: #16a34a; }
    .mock { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <h1>⚽ 竞彩赔率监控</h1>
  <span class="status" id="sourceTag">加载中</span>
  <p id="status">状态：连接中...</p>
  <p id="time"></p>
  <div>
    <button onclick="refresh()">🔄 刷新数据</button>
    <button onclick="reset()">重置差额</button>
  </div>
  <div id="matches"></div>

  <script>
    let matches = [];
    let prevOdds = new Map();

    function getToday() {
      const d = new Date();
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }

    async function refresh() {
      document.getElementById('status').textContent = '状态：获取中...';
      
      // 获取实时数据
      try {
        const resp = await fetch('https://webapi.sporttery.cn/gateway/uniform/football/getMatchCalculatorV1.qry?channel=c&_='+Date.now(), {
          headers: { 'Accept': 'application/json', 'Referer': 'https://www.sporttery.cn/' }
        });
        if (resp.ok) {
          const data = await resp.json();
          if (data.success && data.value) {
            parseData(data.value);
            document.getElementById('sourceTag').textContent = '实时数据';
            document.getElementById('sourceTag').className = 'status real';
          }
        }
      } catch(e) {
        if (!matches.length) loadMock();
        document.getElementById('sourceTag').textContent = '模拟数据';
        document.getElementById('sourceTag').className = 'status mock';
      }

      // 发送到后端保存快照
      try {
        await fetch('/api/compare', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(matches.map(m => ({ id: m.id, odds: m.odds })))
        });
      } catch(e) {}

      render();
      document.getElementById('status').textContent = '状态：✅ 就绪';
      document.getElementById('time').textContent = '更新：' + new Date().toLocaleTimeString('zh-CN');
    }

    function parseData(value) {
      const list = value.matchInfoList;
      if (!list) return;
      let all = [];
      list.forEach(day => { if (day.subMatchList) all = all.concat(day.subMatchList); });
      matches = all.map((item, idx) => ({
        id: String(item.matchId || idx),
        home: item.homeTeamAllName || '主队',
        away: item.awayTeamAllName || '客队',
        time: (item.matchTime || '').substring(0, 5),
        league: item.leagueAbbName || '',
        odds: {
          had: item.had ? { h: parseFloat(item.had.h)||0, d: parseFloat(item.had.d)||0, a: parseFloat(item.had.a)||0 } : null
        }
      })).filter(m => m.odds.had);
      if (!prevOdds.size) saveSnapshot();
    }

    function loadMock() {
      matches = [
        { id:'1', home:'首尔FC', away:'浦项制铁', time:'18:30', league:'韩职', odds:{had:{h:1.7,d:3.15,a:4.46}} },
        { id:'2', home:'富川FC', away:'安养FC', time:'18:30', league:'韩职', odds:{had:{h:2.86,d:2.9,a:2.3}} },
        { id:'3', home:'光州FC', away:'金泉尚武', time:'18:30', league:'韩职', odds:{had:{h:3.75,d:3.26,a:1.8}} },
        { id:'4', home:'奥莫尼亚', away:'阿拉木图', time:'01:00', league:'欧冠', odds:{had:{h:1.56,d:3.6,a:4.75}} }
      ];
      saveSnapshot();
    }

    function saveSnapshot() {
      prevOdds.clear();
      matches.forEach(m => prevOdds.set(m.id, JSON.parse(JSON.stringify(m.odds))));
    }

    function getDiff(id, pool, key) {
      const prev = prevOdds.get(id);
      if (!prev || !prev[pool]) return 0;
      const match = matches.find(m => m.id === id);
      return (match.odds[pool][key] || 0) - (prev[pool][key] || 0);
    }

    function fmtDiff(v) { return Math.abs(v) < 0.005 ? '0.00' : (v > 0 ? '+' : '') + v.toFixed(2); }

    function render() {
      let html = '';
      matches.forEach(m => {
        const o = m.odds.had;
        const dw = getDiff(m.id, 'had', 'h');
        const dd = getDiff(m.id, 'had', 'd');
        const dl = getDiff(m.id, 'had', 'a');
        html += `<div class="card">
          <strong>${m.league}</strong> ${m.home} vs ${m.away} 🕒${m.time}<br>
          胜: ${o.h.toFixed(2)} <span class="${dw>0?'red':'green'}">${fmtDiff(dw)}</span> | 
          平: ${o.d.toFixed(2)} <span class="${dd>0?'red':'green'}">${fmtDiff(dd)}</span> | 
          负: ${o.a.toFixed(2)} <span class="${dl>0?'red':'green'}">${fmtDiff(dl)}</span>
        </div>`;
      });
      document.getElementById('matches').innerHTML = html;
    }

    function reset() {
      saveSnapshot();
      render();
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
