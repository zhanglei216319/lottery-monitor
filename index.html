<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>竞彩实时赔率 · 全时段历史监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 12px; }
    .container { max-width: 1200px; margin: 0 auto; }

    .header {
      background: linear-gradient(135deg, #0b2b5e, #1a4a8b);
      border-radius: 16px; padding: 14px 18px; margin-bottom: 12px;
      color: #fff; box-shadow: 0 8px 24px rgba(11,43,94,0.25);
      position: sticky; top: 10px; z-index: 100;
    }
    .header h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .header h1 span { background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 15px; font-size: 0.65rem; }
    .info-bar { display: flex; justify-content: space-between; margin-top: 6px; flex-wrap: wrap; gap: 6px; font-size: 0.7rem; }
    .date-badge { background: #ffd966; color: #0b2b5e; font-weight: 700; padding: 4px 12px; border-radius: 15px; }
    .status-badge { background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 15px; display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-ok { background: #2ecc71; animation: pulse 1.6s infinite; }
    .dot-err { background: #f59e0b; }
    @keyframes pulse { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }

    .controls { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .btn { padding: 7px 14px; border-radius: 18px; border: 1px solid #d1d5db; background: #fff; font-weight: 600; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; gap: 3px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); transition: all 0.2s; }
    .btn:hover { background: #eef2ff; border-color: #1a4a8b; }
    .btn-primary { background: #0b2b5e; color: #fff; border: none; }
    .btn:active { transform: scale(0.95); }
    .legend { margin-left: auto; display: flex; gap: 8px; background: #fff; padding: 5px 10px; border-radius: 15px; font-size: 0.6rem; }
    .up { color: #dc2626; font-weight: 700; } .down { color: #16a34a; font-weight: 700; }

    .match-card { background: #fff; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 3px 12px rgba(0,0,0,0.03); border: 1px solid #eef1f6; overflow: hidden; transition: border-color 0.5s; }
    .match-card.flash-update { border-color: #f59e0b; }
    .match-header { display: flex; align-items: center; padding: 10px 12px; gap: 8px; cursor: pointer; user-select: none; flex-wrap: wrap; }
    .match-header:hover { background: #fafbfc; }
    .expand-icon { font-size: 0.6rem; color: #94a3b8; transition: 0.3s; min-width: 12px; }
    .expand-icon.open { transform: rotate(90deg); }

    .league-tag { font-size: 0.55rem; color: #fff; font-weight: 700; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
    .league-KD1 { background: #2563eb; } .league-UCL { background: #7c3aed; }
    .league-PL { background: #dc2626; } .league-SA { background: #ea580c; }
    .league-BL { background: #16a34a; } .league-default { background: #64748b; }

    .teams { font-weight: 700; font-size: 0.8rem; flex: 1; min-width: 130px; }
    .teams .vs { color: #94a3b8; margin: 0 3px; } .team-rank { font-size: 0.5rem; color: #94a3b8; }
    .match-meta { text-align: right; font-size: 0.6rem; color: #64748b; }
    .match-time { background: #eef2ff; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .match-num { font-size: 0.5rem; color: #94a3b8; }

    .pools-panel { display: none; border-top: 1px solid #f1f5f9; background: #fafbfc; }
    .pools-panel.open { display: block; }
    .pool-tabs { display: flex; border-bottom: 2px solid #e2e8f0; overflow-x: auto; padding: 0 4px; }
    .pool-tab { padding: 6px 8px; font-size: 0.6rem; font-weight: 600; color: #64748b; cursor: pointer; white-space: nowrap; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: 0.2s; }
    .pool-tab.active { color: #0b2b5e; border-bottom-color: #0b2b5e; }
    .pool-tab:hover { color: #1a4a8b; }

    .pool-content { display: none; padding: 8px 12px; }
    .pool-content.active { display: block; }

    .odds-table { width: 100%; border-collapse: collapse; font-size: 0.65rem; margin-bottom: 6px; }
    .odds-table th { background: #f1f5f9; padding: 4px 5px; text-align: center; font-weight: 600; color: #475569; font-size: 0.55rem; }
    .odds-table td { padding: 4px 5px; text-align: center; border-bottom: 1px solid #f8fafc; transition: all 0.3s; }
    .cur-val { font-weight: 700; font-size: 0.75rem; transition: all 0.3s; }
    .cur-val.changed { animation: valPop 0.6s ease; }
    @keyframes valPop { 0%{color:#f59e0b;transform:scale(1.2)} 100%{color:#0f172a;transform:scale(1)} }
    .diff-badge { font-size: 0.5rem; font-weight: 700; padding: 1px 4px; border-radius: 6px; display: inline-block; min-width: 35px; transition: all 0.3s; }
    .diff-badge.poped { animation: diffPop 0.5s ease; }
    @keyframes diffPop { 0%{transform:scale(1.5);opacity:0.5} 100%{transform:scale(1);opacity:1} }
    .diff-up { color: #dc2626; background: #fef2f2; } .diff-down { color: #16a34a; background: #f0fdf4; } .diff-zero { color: #94a3b8; }

    .crs-grid { display: grid; gap: 2px; padding: 3px 0; margin-bottom: 6px; }
    .crs-item { display: flex; justify-content: space-between; align-items: center; padding: 2px 5px; background: #fff; border-radius: 4px; font-size: 0.6rem; border: 1px solid #f1f5f9; }
    .crs-score { font-weight: 700; min-width: 28px; } .crs-score.other { color: #7c3aed; }
    .crs-section-title { grid-column: 1/-1; font-size: 0.5rem; font-weight: 700; color: #64748b; padding: 2px 0 1px; border-bottom: 1px solid #e2e8f0; }

    .full-history-wrap { max-height: 350px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; }
    .full-history-table { width: 100%; border-collapse: collapse; font-size: 0.6rem; }
    .full-history-table th { background: #f8fafc; padding: 4px 6px; text-align: center; font-weight: 600; color: #475569; font-size: 0.55rem; position: sticky; top: 0; z-index: 1; border-bottom: 2px solid #e2e8f0; }
    .full-history-table td { padding: 3px 5px; text-align: center; border-bottom: 1px solid #f1f5f9; }
    .full-history-table tr:hover td { background: #fafbfc; }
    .time-col { color: #64748b; font-size: 0.55rem; white-space: nowrap; min-width: 70px; }

    .handicap-info { font-size: 0.5rem; background: #fefce8; padding: 1px 5px; border-radius: 6px; }
    .section-title { font-size: 0.65rem; font-weight: 700; color: #0b2b5e; margin: 8px 0 4px; padding-bottom: 3px; border-bottom: 2px solid #0b2b5e; display: flex; align-items: center; gap: 4px; }
    .no-data { text-align: center; padding: 15px; color: #94a3b8; font-size: 0.7rem; }
    .footer-bar { text-align: center; font-size: 0.55rem; color: #94a3b8; margin-top: 8px; }
    .record-count { font-size: 0.5rem; color: #94a3b8; margin-left: 4px; }
    .source-tag { font-size: 0.5rem; padding: 2px 5px; border-radius: 6px; margin-left: 3px; }
    .source-real { background: #dcfce7; color: #16a34a; } .source-mock { background: #fef3c7; color: #92400e; }
    .refresh-progress { font-size: 0.55rem; color: #94a3b8; margin-left: 8px; }

    @media (max-width: 600px) {
      .match-header { padding: 8px 10px; } .teams { font-size: 0.7rem; }
      .pool-tab { padding: 5px 6px; font-size: 0.55rem; } .crs-item { padding: 2px 3px; font-size: 0.55rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚽ 竞彩足球 · 实时赔率监控 <span>历史对比</span><span class="source-tag" id="sourceTag">等待数据</span></h1>
    <div class="info-bar">
      <div class="date-badge" id="displayDate">📅 加载中</div>
      <div class="status-badge"><span class="dot dot-ok" id="dot"></span> <span id="statusText">就绪</span><span class="refresh-progress" id="refreshProgress"></span></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="fetchAndSave()">🌐 获取最新赔率</button>
    <button class="btn" onclick="resetHistory()">🔄 重置历史</button>
    <button class="btn" onclick="toggleAutoRefresh()" id="autoBtn">⏸️ 暂停自动</button>
    <div class="legend"><span>🔴<span class="up">涨</span></span><span>🟢<span class="down">跌</span></span><span>⚪平</span></div>
  </div>

  <div id="matchesContainer"></div>
  <div class="footer-bar">💡 浏览器请求API → 后端存储 → 局部刷新 | 红色涨🟢绿跌</div>
</div>

<script>
  const POOLS = ['had', 'hhad', 'crs', 'ttg', 'hafu'];
  const POOL_NAMES = { had: '胜平负', hhad: '让球胜平负', crs: '比分', ttg: '总进球数', hafu: '半全场' };
  const POOL_ICONS = { had: '⚽', hhad: '🎯', crs: '📊', ttg: '🔢', hafu: '⏱️' };
  const HAD_LABELS = { h: '胜', d: '平', a: '负' };
  const HAFU_LABELS = { hh: '胜胜', hd: '胜平', ha: '胜负', dh: '平胜', dd: '平平', da: '平负', ah: '负胜', ad: '负平', aa: '负负' };
  const TTG_LABELS = { s0: '0球', s1: '1球', s2: '2球', s3: '3球', s4: '4球', s5: '5球', s6: '6球', s7: '7+' };
  const CRS_KEYS = ['s00s00','s00s01','s00s02','s00s03','s00s04','s00s05','s01s00','s01s01','s01s02','s01s03','s01s04','s01s05','s02s00','s02s01','s02s02','s02s03','s02s04','s02s05','s03s00','s03s01','s03s02','s03s03','s04s00','s04s01','s04s02','s05s00','s05s01','s05s02','s1sh','s1sd','s1sa'];
  const SCORE_MAP = {'s00s00':'0:0','s00s01':'0:1','s00s02':'0:2','s00s03':'0:3','s00s04':'0:4','s00s05':'0:5','s01s00':'1:0','s01s01':'1:1','s01s02':'1:2','s01s03':'1:3','s01s04':'1:4','s01s05':'1:5','s02s00':'2:0','s02s01':'2:1','s02s02':'2:2','s02s03':'2:3','s02s04':'2:4','s02s05':'2:5','s03s00':'3:0','s03s01':'3:1','s03s02':'3:2','s03s03':'3:3','s04s00':'4:0','s04s01':'4:1','s04s02':'4:2','s05s00':'5:0','s05s01':'5:1','s05s02':'5:2','s1sh':'胜其他','s1sd':'平其他','s1sa':'负其他'};

  let matchHistory = [];
  let autoRefresh = true;
  let refreshCountdown = 60;
  let isFirstLoad = true;

  function getScoreGroup(k) {
    if(k==='s1sh')return'other_win';if(k==='s1sd')return'other_draw';if(k==='s1sa')return'other_lose';
    if(k==='s00s00')return'draw';
    const r=k.match(/s(\d+)s(\d+)/);if(!r)return'other';
    return+r[1]>+r[2]?'win':(+r[1]<+r[2]?'lose':'draw');
  }
  function getPoolKeys(p) {
    if(p==='had'||p==='hhad')return['h','d','a'];
    if(p==='hafu')return['hh','hd','ha','dh','dd','da','ah','ad','aa'];
    if(p==='ttg')return['s0','s1','s2','s3','s4','s5','s6','s7'];
    return CRS_KEYS;
  }
  function getLeagueClass(c) { return {'KD1':'league-KD1','UCL':'league-UCL','PL':'league-PL','SA':'league-SA','BL':'league-BL'}[c]||'league-default'; }
  function getToday() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  // ========== 自动刷新 ==========
  function toggleAutoRefresh() {
    autoRefresh = !autoRefresh;
    document.getElementById('autoBtn').textContent = autoRefresh ? '⏸️ 暂停自动' : '▶️ 开启自动';
    document.getElementById('refreshProgress').textContent = autoRefresh ? '' : '(已暂停)';
    showToast(autoRefresh ? '✅ 自动刷新开启' : '⏸️ 自动刷新已暂停');
  }

  function startCountdown() {
    refreshCountdown = 60;
    updateCountdown();
    clearInterval(window._cd);
    window._cd = setInterval(() => {
      refreshCountdown--;
      updateCountdown();
      if (refreshCountdown <= 0) {
        refreshCountdown = 60;
        if (autoRefresh) fetchAndSave(true);
      }
    }, 1000);
  }

  function updateCountdown() {
    const el = document.getElementById('refreshProgress');
    if (el && autoRefresh) el.textContent = `(${refreshCountdown}s)`;
  }

  // ========== 核心：获取数据 + 局部更新 ==========
  async function fetchAndSave(silent = false) {
    if (!silent) {
      document.getElementById('statusText').textContent = '⏳ 请求中...';
      document.getElementById('dot').className = 'dot dot-err';
    }

    let realData = false;
    let newMatches = null;

    // 浏览器请求竞彩API
    try {
      const resp = await fetch(
        'https://webapi.sporttery.cn/gateway/uniform/football/getMatchCalculatorV1.qry?channel=c&_=' + Date.now(),
        { headers: { 'Accept': 'application/json' } }
      );
      if (resp.ok) {
        const data = await resp.json();
        if (data && data.success && data.value) {
          newMatches = parseMatches(data.value);
          realData = true;
        }
      }
    } catch (e) {
      console.warn('API请求失败:', e.message);
    }

    // 发送到后端
    if (newMatches && newMatches.length > 0) {
      try {
        const resp = await fetch('/api/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ matches: newMatches })
        });
        const result = await resp.json();
        if (result.success && result.history) {
          // 局部更新！
          updateMatchesInPlace(result.history);
        }
      } catch (e) {
        console.error('后端保存失败:', e.message);
        // 降级：完整重新加载
        await loadFullHistory();
        renderAllMatches();
      }
    } else if (!silent) {
      await loadFullHistory();
      renderAllMatches();
    }

    // 更新状态
    document.getElementById('dot').className = 'dot dot-ok';
    document.getElementById('statusText').textContent = realData ? '✅ 实时' : '⚠️ 离线';
    document.getElementById('sourceTag').textContent = realData ? '实时' : '离线';
    document.getElementById('sourceTag').className = 'source-tag ' + (realData ? 'source-real' : 'source-mock');
    document.getElementById('displayDate').textContent = '📅 ' + getToday();
    refreshCountdown = 60;
  }

  function parseMatches(value) {
    const list = value.matchInfoList;
    if (!list || !Array.isArray(list)) return [];
    let all = [];
    list.forEach(day => { if (day.subMatchList) all = all.concat(day.subMatchList); });

    return all.map(item => {
      const odds = {};
      if (item.had) odds.had = { h: +item.had.h||0, d: +item.had.d||0, a: +item.had.a||0 };
      if (item.hhad) odds.hhad = { h: +item.hhad.h||0, d: +item.hhad.d||0, a: +item.hhad.a||0 };
      if (item.crs) { odds.crs = {}; CRS_KEYS.forEach(k => { if (item.crs[k] !== undefined) odds.crs[k] = +item.crs[k]||0; }); }
      if (item.ttg) { odds.ttg = {}; for (let i=0;i<=7;i++) if (item.ttg['s'+i] !== undefined) odds.ttg['s'+i] = +item.ttg['s'+i]||0; }
      if (item.hafu) { odds.hafu = {}; ['hh','hd','ha','dh','dd','da','ah','ad','aa'].forEach(k => { if (item.hafu[k] !== undefined) odds.hafu[k] = +item.hafu[k]||0; }); }
      return {
        id: String(item.matchId),
        home: item.homeTeamAllName || item.homeTeamAbbName || '',
        away: item.awayTeamAllName || item.awayTeamAbbName || '',
        homeRank: item.homeRank || '', awayRank: item.awayRank || '',
        time: (item.matchTime || '').substring(0, 5),
        matchNum: item.matchNumStr || '',
        league: item.leagueAbbName || '', leagueAllName: item.leagueAllName || '',
        leagueCode: item.leagueCode || '',
        hhadGoalLine: item.hhad?.goalLine || '', hhadGoalLineValue: item.hhad?.goalLineValue || '',
        odds
      };
    }).filter(m => m.odds.had);
  }

  // ========== 局部更新核心逻辑 ==========
  function updateMatchesInPlace(newHistory) {
    if (!newHistory || !newHistory.length) return;

    const oldMap = new Map(matchHistory.map(m => [m.matchId, m]));
    let hasChanges = false;

    newHistory.forEach(nh => {
      const old = oldMap.get(nh.matchId);
      if (!old) {
        // 新比赛：追加到DOM
        matchHistory.push(nh);
        appendMatchCard(nh);
        hasChanges = true;
        return;
      }

      // 更新内存数据
      old.info = nh.info;
      let matchChanged = false;

      POOLS.forEach(pool => {
        const newRecords = nh[pool] || [];
        const oldRecords = old[pool] || [];
        
        if (newRecords.length !== oldRecords.length) {
          old[pool] = newRecords;
          matchChanged = true;
        } else if (newRecords.length > 0) {
          // 检查最新记录是否变化
          const newFirst = newRecords[0];
          const oldFirst = oldRecords[0];
          if (newFirst._time !== oldFirst._time || newFirst._timestamp !== oldFirst._timestamp) {
            old[pool] = newRecords;
            matchChanged = true;
          }
        }
      });

      if (matchChanged) {
        // 局部更新DOM
        updateMatchCardDOM(nh.matchId, nh);
        hasChanges = true;
      }
    });

    // 移除已不存在的比赛
    const newIds = new Set(newHistory.map(m => m.matchId));
    matchHistory = matchHistory.filter(m => {
      if (!newIds.has(m.matchId)) {
        removeMatchCardDOM(m.matchId);
        return false;
      }
      return true;
    });

    if (!isFirstLoad && hasChanges) {
      showToast('📊 赔率已更新', 1500);
    }
    isFirstLoad = false;
  }

  // ========== DOM局部更新 ==========
  function updateMatchCardDOM(matchId, newData) {
    const card = document.getElementById('card-' + matchId);
    if (!card) return;

    // 更新每个玩法的内容
    POOLS.forEach(pool => {
      const content = document.getElementById('content-' + matchId + '-' + pool);
      if (!content) return;

      const records = newData[pool] || [];
      if (!records.length) return;

      // 重建该玩法内容
      content.innerHTML = buildPoolContentInner(newData, pool, newData.info);
    });

    // 更新记录数
    POOLS.forEach(pool => {
      const tab = document.querySelector(`#panel-${matchId} .pool-tab[data-pool="${pool}"]`);
      if (tab) {
        const count = tab.querySelector('.record-count');
        if (count) count.textContent = `(${(newData[pool]||[]).length})`;
      }
    });

    // 闪烁边框
    card.classList.add('flash-update');
    setTimeout(() => card.classList.remove('flash-update'), 1500);
  }

  function appendMatchCard(data) {
    const container = document.getElementById('matchesContainer');
    const div = document.createElement('div');
    div.innerHTML = buildMatchCardHTML(data);
    container.appendChild(div.firstElementChild);
  }

  function removeMatchCardDOM(matchId) {
    const card = document.getElementById('card-' + matchId);
    if (card) {
      card.style.opacity = '0';
      card.style.transform = 'translateX(-20px)';
      card.style.transition = '0.3s';
      setTimeout(() => card.remove(), 300);
    }
  }

  async function loadFullHistory() {
    try {
      const resp = await fetch('/api/history?_=' + Date.now());
      const result = await resp.json();
      if (result.success) matchHistory = result.history || [];
    } catch (e) {}
  }

  // ========== 完整渲染（首次加载） ==========
  function renderAllMatches() {
    const c = document.getElementById('matchesContainer');
    if (!matchHistory.length) { c.innerHTML = '<div class="no-data">暂无数据，点击"获取最新赔率"开始</div>'; return; }
    c.innerHTML = matchHistory.map(m => buildMatchCardHTML(m)).join('');
  }

  function buildMatchCardHTML(m) {
    const info = m.info || {};
    const leagueName = info.league || info.leagueAllName || '未知';
    return `
      <div class="match-card" id="card-${m.matchId}">
        <div class="match-header" onclick="toggleMatch('${m.matchId}')">
          <span class="expand-icon" id="icon-${m.matchId}">▶</span>
          <span class="league-tag ${getLeagueClass(info.leagueCode)}">${leagueName}</span>
          <span class="teams">${info.home||'?'} <span class="team-rank">${info.homeRank||''}</span> <span class="vs">VS</span> <span class="team-rank">${info.awayRank||''}</span> ${info.away||'?'}</span>
          <span class="match-meta"><span class="match-time">🕒 ${info.time||''}</span><div class="match-num">#${info.matchNum||''}</div></span>
        </div>
        <div class="pools-panel" id="panel-${m.matchId}">
          <div class="pool-tabs">
            ${POOLS.filter(p => m[p] && m[p].length > 0).map((p, pi) => `
              <button class="pool-tab ${pi===0?'active':''}" data-pool="${p}" onclick="switchPool(event,'${m.matchId}','${p}')">${POOL_ICONS[p]} ${POOL_NAMES[p]}<span class="record-count">(${m[p].length})</span></button>
            `).join('')}
          </div>
          ${POOLS.filter(p => m[p] && m[p].length > 0).map((p, pi) => `
            <div class="pool-content ${pi===0?'active':''}" id="content-${m.matchId}-${p}">${buildPoolContentInner(m, p, info)}</div>
          `).join('')}
        </div>
      </div>`;
  }

  function buildPoolContentInner(m, pool, info) {
    const records = m[pool] || [];
    if (!records.length) return '<div class="no-data">暂无数据</div>';
    const current = records[0], previous = records.length > 1 ? records[1] : null;
    let html = '';

    if (pool === 'hhad' && info.hhadGoalLine) {
      const glv = parseFloat(info.hhadGoalLineValue) || 0;
      const gt = glv < 0 ? (info.home||'主队') : (info.away||'客队');
      html += `<div style="text-align:center;padding:3px;font-size:0.6rem;color:#92400e;">${gt} <span class="handicap-info">让${Math.abs(glv)||1}球</span></div>`;
    }

    html += '<div class="section-title">📌 当前赔率 (vs上一时间)</div>';
    if (pool === 'crs') {
      html += buildCrsGrid(current, previous);
    } else {
      html += buildCurrentTable(current, previous, pool);
    }

    html += `<div class="section-title">📜 全时段记录 (共${records.length}次)</div>`;
    if (pool === 'crs') {
      html += buildCrsFullHistory(records);
    } else {
      html += buildFullHistory(records, pool);
    }
    return html;
  }

  // ========== 构建表格 ==========
  function buildCurrentTable(cur, prev, pool) {
    const keys = getPoolKeys(pool);
    const labels = pool === 'had' || pool === 'hhad' ? HAD_LABELS : (pool === 'hafu' ? HAFU_LABELS : TTG_LABELS);
    let h = '<table class="odds-table"><tr><th>选项</th><th>当前</th><th>上期</th><th>差额</th></tr>';
    keys.forEach(k => {
      if (cur[k] !== undefined) {
        const d = prev && prev[k] !== undefined ? +(cur[k] - prev[k]).toFixed(2) : null;
        const ds = d !== null ? (d > 0 ? '+' + d.toFixed(2) : d.toFixed(2)) : '首次';
        const dc = d !== null ? (d > 0.005 ? 'diff-up' : (d < -0.005 ? 'diff-down' : 'diff-zero')) : 'diff-zero';
        h += `<tr><td>${labels[k]||k}</td><td class="cur-val">${cur[k].toFixed(2)}</td><td>${prev?.[k]?.toFixed(2)||'-'}</td><td><span class="diff-badge ${dc}">${ds}</span></td></tr>`;
      }
    });
    return h + '</table>';
  }

  function buildCrsGrid(cur, prev) {
    const groups = { win:{title:'🏠主胜',items:[]}, draw:{title:'🤝平局',items:[]}, lose:{title:'🚀客胜',items:[]}, other_win:{title:'✨胜其他',items:[]}, other_draw:{title:'✨平其他',items:[]}, other_lose:{title:'✨负其他',items:[]} };
    CRS_KEYS.forEach(k => { if (cur[k] !== undefined) { const g = getScoreGroup(k); if (groups[g]) groups[g].items.push(k); } });
    const ag = Object.entries(groups).filter(([_,g]) => g.items.length);
    const total = ag.reduce((s,[_,g]) => s+g.items.length, 0);
    const cols = total <= 12 ? 3 : (total <= 20 ? 4 : 5);
    let h = `<div class="crs-grid" style="grid-template-columns:repeat(${cols},1fr);">`;
    ag.forEach(([gk, group]) => {
      if (!group.title.startsWith('✨')) h += `<div class="crs-section-title">${group.title}</div>`;
      group.items.forEach(k => {
        const d = prev && prev[k] !== undefined ? +(cur[k] - prev[k]).toFixed(2) : null;
        const dc = d !== null ? (d > 0.005 ? 'diff-up' : (d < -0.005 ? 'diff-down' : 'diff-zero')) : 'diff-zero';
        h += `<div class="crs-item"><span class="crs-score${group.title.startsWith('✨')?' other':''}">${SCORE_MAP[k]}</span><span style="font-weight:700;">${cur[k].toFixed(2)}</span><span class="diff-badge ${dc}" style="font-size:0.45rem;">${d!==null?(d>0?'+'+d.toFixed(2):d.toFixed(2)):'首次'}</span></div>`;
      });
    });
    return h + '</div>';
  }

  function buildFullHistory(records, pool) {
    if (records.length <= 1) return '<div class="no-data" style="padding:8px;">暂无更多历史</div>';
    const keys = getPoolKeys(pool);
    const labels = pool === 'had' || pool === 'hhad' ? HAD_LABELS : (pool === 'hafu' ? HAFU_LABELS : TTG_LABELS);
    let h = '<div class="full-history-wrap"><table class="full-history-table"><tr><th class="time-col">时间</th>';
    keys.forEach(k => h += `<th>${labels[k]||k}</th>`);
    h += '<th>变化</th></tr>';
    for (let i = 0; i < records.length; i++) {
      const rec = records[i], prev = i < records.length - 1 ? records[i + 1] : null;
      h += `<tr><td class="time-col">${rec._time||''}</td>`;
      keys.forEach(k => {
        const val = rec[k] !== undefined ? rec[k].toFixed(2) : '-';
        const d = prev && rec[k] !== undefined && prev[k] !== undefined ? +(rec[k] - prev[k]).toFixed(2) : null;
        const style = d !== null ? (d > 0.005 ? 'color:#dc2626;font-weight:700' : (d < -0.005 ? 'color:#16a34a;font-weight:700' : '')) : '';
        h += `<td style="${style}">${val}</td>`;
      });
      let changes = '';
      if (prev) {
        const arr = [];
        keys.forEach(k => {
          const d = rec[k] !== undefined && prev[k] !== undefined ? +(rec[k] - prev[k]).toFixed(2) : null;
          if (d !== null && Math.abs(d) > 0.005) arr.push(`<span style="color:${d>0?'#dc2626':'#16a34a'};font-size:0.45rem;">${labels[k]}${d>0?'▲+':''}${d}</span>`);
        });
        changes = arr.join(' ') || '<span style="color:#94a3b8;">-</span>';
      } else { changes = '<span style="color:#94a3b8;">首次</span>'; }
      h += `<td style="font-size:0.45rem;">${changes}</td></tr>`;
    }
    return h + '</table></div>';
  }

  function buildCrsFullHistory(records) {
    if (records.length <= 1) return '<div class="no-data" style="padding:8px;">暂无更多历史</div>';
    let h = '<div class="full-history-wrap"><table class="full-history-table"><tr><th class="time-col">时间</th><th>变化的比分</th></tr>';
    for (let i = 0; i < records.length; i++) {
      const rec = records[i], prev = i < records.length - 1 ? records[i + 1] : null;
      h += `<tr><td class="time-col">${rec._time||''}</td><td style="text-align:left;font-size:0.5rem;">`;
      if (prev) {
        let arr = [];
        CRS_KEYS.forEach(k => {
          if (rec[k] !== undefined && prev[k] !== undefined) {
            const d = +(rec[k] - prev[k]).toFixed(2);
            if (Math.abs(d) > 0.005) arr.push(`<span style="color:${d>0?'#dc2626':'#16a34a'};">${SCORE_MAP[k]}:${rec[k].toFixed(2)} ${d>0?'▲+':''}${d}</span>`);
          }
        });
        h += arr.length ? arr.join(' | ') : '<span style="color:#94a3b8;">无变化</span>';
      } else { h += '<span style="color:#94a3b8;">首次记录</span>'; }
      h += '</td></tr>';
    }
    return h + '</table></div>';
  }

  // ========== 交互 ==========
  window.toggleMatch = function(id) {
    const p = document.getElementById('panel-' + id), ic = document.getElementById('icon-' + id);
    if (p && ic) { p.classList.toggle('open'); ic.classList.toggle('open'); }
  };
  window.switchPool = function(e, mid, pool) {
    e.stopPropagation();
    const panel = document.getElementById('panel-' + mid);
    if (!panel) return;
    panel.querySelectorAll('.pool-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    panel.querySelectorAll('.pool-content').forEach(c => c.classList.remove('active'));
    const ct = document.getElementById('content-' + mid + '-' + pool);
    if (ct) ct.classList.add('active');
  };

  async function resetHistory() {
    if (!confirm('确定清除所有历史记录？')) return;
    try {
      await fetch('/api/reset', { method: 'POST' });
      matchHistory = [];
      document.getElementById('matchesContainer').innerHTML = '<div class="no-data">历史已清除，点击"获取最新赔率"重新开始</div>';
      showToast('✅ 已清除');
    } catch (e) {}
  }

  function showToast(msg, d=1800) {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:8px 20px;border-radius:20px;font-size:0.8rem;z-index:9999;transition:opacity 0.3s;pointer-events:none;'; document.body.appendChild(t); }
    t.textContent = msg; t.style.opacity = '1'; clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = '0', d);
  }

  // ========== 初始化 ==========
  document.getElementById('displayDate').textContent = '📅 ' + getToday();
  (async () => {
    await loadFullHistory();
    if (matchHistory.length > 0) {
      renderAllMatches();
      document.getElementById('statusText').textContent = '✅ 已加载';
      document.getElementById('sourceTag').textContent = '历史';
      document.getElementById('sourceTag').className = 'source-tag source-mock';
    }
    fetchAndSave(true);
  })();
  startCountdown();
</script>
</body>
</html>
